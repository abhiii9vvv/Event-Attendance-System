<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="90" cy="90" r="88" fill="url(#gradientBg)" stroke="#001d3d" stroke-width="2"/>
  
  <!-- Clipboard -->
  <g>
    <!-- Clipboard board -->
    <rect x="45" y="50" width="90" height="95" rx="8" fill="#ffffff" stroke="#003366" stroke-width="2"/>
    
    <!-- Clipboard clip -->
    <rect x="50" y="35" width="80" height="20" rx="4" fill="#003366" stroke="#001d3d" stroke-width="2"/>
    <circle cx="65" cy="45" r="4" fill="#001d3d"/>
    <circle cx="115" cy="45" r="4" fill="#001d3d"/>
    
    <!-- Lines on clipboard (representing list items) -->
    <line x1="55" y1="70" x2="125" y2="70" stroke="#cccccc" stroke-width="2" stroke-linecap="round"/>
    <line x1="55" y1="85" x2="125" y2="85" stroke="#cccccc" stroke-width="2" stroke-linecap="round"/>
    <line x1="55" y1="100" x2="110" y2="100" stroke="#cccccc" stroke-width="2" stroke-linecap="round"/>
    <line x1="55" y1="115" x2="115" y2="115" stroke="#cccccc" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Large checkmark -->
  <g>
    <!-- Checkmark -->
    <path d="M 70 95 L 80 105 L 110 75" 
          stroke="#22c55e" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
  
  <!-- Decorative circles for depth -->
  <circle cx="90" cy="90" r="88" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
</svg>